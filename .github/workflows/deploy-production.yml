name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-managed:
    name: Render managed
    runs-on: ubuntu-latest
    steps:
      - name: Explain deployment ownership
        run: |
          echo "Production deployments are no longer managed by GitHub Actions or Vercel."
          echo "Render auto-deploys the Rox services from the main branch."
          echo "Use scripts/render-deploy.sh when a specific Render service needs a manual deploy."
          echo "Database migrations are not run by this workflow; run them through the explicit migration process."
