name: Build Desktop App

on:
  workflow_call:
    inputs:
      channel:
        description: "Release channel (stable or canary)"
        required: true
        type: string
      version_suffix:
        description: "Version suffix to append (e.g., -canary). Empty for stable."
        required: false
        type: string
        default: ""
      electron_builder_config:
        description: "Electron builder config file"
        required: false
        type: string
        default: "electron-builder.ts"
      artifact_prefix:
        description: "Prefix for artifact names"
        required: false
        type: string
        default: "desktop"
      artifact_retention_days:
        description: "Number of days to retain artifacts"
        required: false
        type: number
        default: 30

jobs:
  build-macos:
    name: Build - macOS (${{ matrix.arch }})
    runs-on: macos-latest
    environment: production

    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        shell: bash
        run: |
          # Retry to absorb transient registry/network flakes (e.g. tarball download failures).
          attempts=3
          for attempt in $(seq 1 $attempts); do
            if bun install --frozen --ignore-scripts; then break; fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::bun install failed after $attempts attempts"
              exit 1
            fi
            echo "::warning::bun install failed (attempt $attempt); retrying in $((attempt*10))s"
            sleep $((attempt*10))
          done

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        run: |
          # Read current version and append suffix
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          echo "Setting version to: $NEW_VERSION"
          # Update package.json version using node
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Generate file icons
        working-directory: apps/desktop
        run: bun run generate:icons

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          ROX_AI_API_KEY: ${{ secrets.ROX_AI_API_KEY }}
          ROX_AI_BASE_URL: ${{ secrets.ROX_AI_BASE_URL }}
          ROX_AI_MODEL: ${{ secrets.ROX_AI_MODEL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RELAY_URL: ${{ secrets.RELAY_URL }}
          ROX_WORKSPACE_NAME: rox
          TARGET_ARCH: ${{ matrix.arch }}
        run: bun run compile:app

      # electron-builder checks `process.env.CSC_LINK != null`, and an unset GitHub
      # secret expands to an empty string (""), which passes that check. It then
      # resolves "" as a certificate path → the project dir → "⨯ apps/desktop not a
      # file", failing the unsigned macOS build. Only export the signing vars when a
      # certificate is actually configured; otherwise disable identity discovery so
      # electron-builder ad-hoc signs (identity "-") instead.
      - name: Configure macOS code signing
        working-directory: apps/desktop
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$MAC_CERTIFICATE" ]; then
            echo "Apple certificate present — producing a signed build."
            echo "::add-mask::$MAC_CERTIFICATE"
            echo "CSC_LINK=$MAC_CERTIFICATE" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$MAC_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "No MAC_CERTIFICATE secret — producing an unsigned (ad-hoc) build."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TARGET_ARCH: ${{ matrix.arch }}
          # Authenticated `gh release download` for the preinstall catalog (prepackage step)
          GH_TOKEN: ${{ github.token }}
        run: bun run package -- --publish never --config ${{ inputs.electron_builder_config }} --${{ matrix.arch }}

      - name: Verify app-update.yml exists
        working-directory: apps/desktop
        run: |
          # electron-builder uses mac-arm64/ for arm64 and mac/ for x64 (when host is arm64)
          APP_DIR=$(find release -maxdepth 2 -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "::error::No .app bundle found in release/"
            ls -la release/
            exit 1
          fi
          echo "Found app bundle: $APP_DIR"
          test -f "$APP_DIR/Contents/Resources/app-update.yml" || {
            echo "::error::app-update.yml missing from $APP_DIR/Contents/Resources/ — auto-update will be broken"
            exit 1
          }
          CLI_BIN="$APP_DIR/Contents/Resources/resources/bin/rox"
          test -x "$CLI_BIN" || {
            echo "::error::Bundled Rox CLI missing or not executable at $CLI_BIN"
            exit 1
          }
          "$CLI_BIN" --version

      - name: Verify native bindings packaged
        working-directory: apps/desktop
        run: |
          APP_DIR=$(find release -maxdepth 2 -name "*.app" -type d | head -1)
          UNPACKED="$APP_DIR/Contents/Resources/app.asar.unpacked/node_modules"
          BINDING="$UNPACKED/@duckdb/node-bindings-darwin-${{ matrix.arch }}/duckdb.node"
          test -f "$BINDING" || {
            echo "::error::DuckDB native binding missing from packaged app — Intel/arm launch will crash. Expected: $BINDING"
            ls -la "$UNPACKED/@duckdb" 2>/dev/null || echo "  (no @duckdb directory in app.asar.unpacked)"
            exit 1
          }
          echo "OK: bundled $BINDING ($(du -h "$BINDING" | cut -f1))"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-dmg
          path: apps/desktop/release/*.dmg
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-zip
          path: apps/desktop/release/*.zip
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload auto-update manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-update-manifest
          path: apps/desktop/release/*-mac.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

  build-linux:
    name: Build - Linux (x64)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        shell: bash
        run: |
          # Retry to absorb transient registry/network flakes (e.g. tarball download failures).
          attempts=3
          for attempt in $(seq 1 $attempts); do
            if bun install --frozen --ignore-scripts; then break; fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::bun install failed after $attempts attempts"
              exit 1
            fi
            echo "::warning::bun install failed (attempt $attempt); retrying in $((attempt*10))s"
            sleep $((attempt*10))
          done

      - name: Install Linux native build deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          echo "Setting version to: $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Generate file icons
        working-directory: apps/desktop
        run: bun run generate:icons

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          ROX_AI_API_KEY: ${{ secrets.ROX_AI_API_KEY }}
          ROX_AI_BASE_URL: ${{ secrets.ROX_AI_BASE_URL }}
          ROX_AI_MODEL: ${{ secrets.ROX_AI_MODEL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RELAY_URL: ${{ secrets.RELAY_URL }}
          ROX_WORKSPACE_NAME: rox
          TARGET_ARCH: x64
        run: bun run compile:app

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          # Authenticated `gh release download` for the preinstall catalog (prepackage step)
          GH_TOKEN: ${{ github.token }}
        run: bun run package -- --publish never --config ${{ inputs.electron_builder_config }}

      - name: Verify Linux AppImage + update manifest exist
        working-directory: apps/desktop
        run: |
          ls -la release
          test -n "$(ls -1 release/*.AppImage 2>/dev/null)" || {
            echo "::error::No AppImage artifact generated in apps/desktop/release"
            exit 1
          }
          test -n "$(ls -1 release/*-linux.yml 2>/dev/null)" || {
            echo "::error::No Linux auto-update manifest generated in apps/desktop/release"
            exit 1
          }
          CLI_BIN=$(find release -path "*/resources/resources/bin/rox" -type f -perm -111 | head -1)
          if [ -z "$CLI_BIN" ]; then
            echo "::error::Bundled Rox CLI missing or not executable in packaged Linux output"
            exit 1
          fi
          "$CLI_BIN" --version

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-linux-appimage
          path: apps/desktop/release/*.AppImage
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload Linux auto-update manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-linux-update-manifest
          path: apps/desktop/release/*-linux.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

  build-windows:
    name: Build - Windows (x64)
    # Pin to windows-2022 (VS 2022 / v17). windows-latest is now
    # windows-2025 with VS 2026 (v18), which node-gyp@11 cannot detect
    # ("Could not find any Visual Studio installation"), breaking the
    # native-module rebuild in install:deps.
    runs-on: windows-2022
    environment: production
    # Windows is allowed to fail without blocking the macOS/Linux release.
    # The build still runs and stays visible (a failed leg shows red), but its
    # failure no longer fails the reusable workflow, so the `release` job still
    # publishes the mac .dmg + linux AppImage. Re-evaluate if Windows must gate.
    continue-on-error: true

    steps:
      # Deeply nested route paths in apps/desktop exceed Windows' 260-char MAX_PATH.
      # Enable git long-path support + the NTFS LongPathsEnabled flag BEFORE checkout,
      # otherwise actions/checkout fails with "Filename too long" (exit 128).
      - name: Enable Windows long paths
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-

      - name: Install dependencies
        shell: bash
        run: |
          # Retry to absorb transient registry/network flakes (e.g. tarball download failures).
          attempts=3
          for attempt in $(seq 1 $attempts); do
            if bun install --frozen --ignore-scripts; then break; fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::bun install failed after $attempts attempts"
              exit 1
            fi
            echo "::warning::bun install failed (attempt $attempt); retrying in $((attempt*10))s"
            sleep $((attempt*10))
          done

      # electron-builder install-app-deps rebuilds native modules (e.g. @parcel/watcher)
      # via node-gyp, which fails on the runner with "Could not find any Visual Studio
      # installation to use". Activate the MSVC build environment so node-gyp finds it.
      - name: Set up MSVC build environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        env:
          npm_config_msvs_version: "2022"
          GYP_MSVS_VERSION: "2022"
          # Electron 40's V8 headers deprecate APIs (e.g. GetAlignedPointerFromInternalField)
          # that native-keymap/etc. still use; MSVC escalates these to error C4996. clang/gcc
          # (mac/linux) only warn, so they pass. node-gyp's generated project passes /WX, which
          # overrides the prepended `CL` flags — so use `_CL_`, which cl.exe APPENDS after the
          # command line, making the final /wd4996 win and disabling C4996 entirely.
          CL: "/wd4996"
          _CL_: "/wd4996"
        run: bun run install:deps

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          node -e "const fs=require('fs');const pkg=require('./package.json');pkg.version='$NEW_VERSION';fs.writeFileSync('./package.json',JSON.stringify(pkg,null,'\t')+'\n');"
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Generate file icons
        working-directory: apps/desktop
        run: bun run generate:icons

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          ROX_AI_API_KEY: ${{ secrets.ROX_AI_API_KEY }}
          ROX_AI_BASE_URL: ${{ secrets.ROX_AI_BASE_URL }}
          ROX_AI_MODEL: ${{ secrets.ROX_AI_MODEL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RELAY_URL: ${{ secrets.RELAY_URL }}
          ROX_WORKSPACE_NAME: rox
          TARGET_ARCH: x64
        run: bun run compile:app

      - name: Build Electron app (Windows, unsigned)
        working-directory: apps/desktop
        run: bun run package -- --publish never --config ${{ inputs.electron_builder_config }}

      - name: Verify Windows installer exists
        working-directory: apps/desktop
        shell: bash
        run: |
          ls -la release
          test -n "$(ls -1 release/*.exe 2>/dev/null)" || {
            echo "::error::No .exe installer generated in apps/desktop/release"
            exit 1
          }

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-windows-exe
          path: apps/desktop/release/*.exe
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload Windows auto-update manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_prefix }}-windows-update-manifest
          path: apps/desktop/release/latest.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: warn
