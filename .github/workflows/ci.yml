name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  sherif:
    name: Sherif
    runs-on: ubuntu-latest
    # Fail fast on an infra stall (e.g. a tsc/typegen network hang) instead of
    # burning ~50 min toward GitHub's 6h default before the job is killed.
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: |
          # Retry to absorb transient registry/network flakes (e.g. tarball download failures).
          attempts=3
          for attempt in $(seq 1 $attempts); do
            if bun install --frozen --ignore-scripts; then break; fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::bun install failed after $attempts attempts"
              exit 1
            fi
            echo "::warning::bun install failed (attempt $attempt); retrying in $((attempt*10))s"
            sleep $((attempt*10))
          done

      - name: Sherif
        run: bunx sherif

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    # Fail fast on an infra stall instead of burning toward the 6h default.
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: |
          # Retry to absorb transient registry/network flakes (e.g. tarball download failures).
          attempts=3
          for attempt in $(seq 1 $attempts); do
            if bun install --frozen --ignore-scripts; then break; fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::bun install failed after $attempts attempts"
              exit 1
            fi
            echo "::warning::bun install failed (attempt $attempt); retrying in $((attempt*10))s"
            sleep $((attempt*10))
          done

      # Gate: fails when HIGH-severity advisories climb above the triaged
      # baseline (issue #479). New highs trip CI; the existing backlog does not
      # block main. Lower BASELINE_HIGH in the script as remediation lands.
      - name: Dependency audit gate
        run: ./scripts/check-dependency-audit.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Fail fast on an infra stall (e.g. a tsc/typegen network hang) instead of
    # burning ~50 min toward GitHub's 6h default before the job is killed.
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: |
          # Retry to absorb transient registry/network flakes (e.g. tarball download failures).
          attempts=3
          for attempt in $(seq 1 $attempts); do
            if bun install --frozen --ignore-scripts; then break; fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::bun install failed after $attempts attempts"
              exit 1
            fi
            echo "::warning::bun install failed (attempt $attempt); retrying in $((attempt*10))s"
            sleep $((attempt*10))
          done

      - name: Lint
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    # Fail fast on an infra stall (e.g. a tsc/typegen network hang) instead of
    # burning ~50 min toward GitHub's 6h default before the job is killed.
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: |
          # Retry to absorb transient registry/network flakes (e.g. tarball download failures).
          attempts=3
          for attempt in $(seq 1 $attempts); do
            if bun install --frozen --ignore-scripts; then break; fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::bun install failed after $attempts attempts"
              exit 1
            fi
            echo "::warning::bun install failed (attempt $attempt); retrying in $((attempt*10))s"
            sleep $((attempt*10))
          done

      - name: Install Linux native build deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Test
        env:
          RELAY_URL: ${{ secrets.RELAY_URL }}
        run: bun run test

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    # Fail fast on an infra stall (e.g. a tsc/typegen network hang) instead of
    # burning ~50 min toward GitHub's 6h default before the job is killed.
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: |
          # Retry to absorb transient registry/network flakes (e.g. tarball download failures).
          attempts=3
          for attempt in $(seq 1 $attempts); do
            if bun install --frozen --ignore-scripts; then break; fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::bun install failed after $attempts attempts"
              exit 1
            fi
            echo "::warning::bun install failed (attempt $attempt); retrying in $((attempt*10))s"
            sleep $((attempt*10))
          done

      - name: Typecheck
        run: bun run typecheck
        env:
          # @rox/desktop tsc needs >4GB; default heap gets OOM-killed (exit 137)
          NODE_OPTIONS: --max-old-space-size=8192

  build:
    name: Build
    runs-on: ubuntu-latest
    # Fail fast on an infra stall (e.g. a tsc/typegen network hang) instead of
    # burning ~50 min toward GitHub's 6h default before the job is killed.
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-revision }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: |
          # Retry to absorb transient registry/network flakes (e.g. tarball download failures).
          attempts=3
          for attempt in $(seq 1 $attempts); do
            if bun install --frozen --ignore-scripts; then break; fi
            if [ "$attempt" -eq "$attempts" ]; then
              echo "::error::bun install failed after $attempts attempts"
              exit 1
            fi
            echo "::warning::bun install failed (attempt $attempt); retrying in $((attempt*10))s"
            sleep $((attempt*10))
          done

      - name: Install Linux native build deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Install desktop native dependencies
        working-directory: apps/desktop
        run: bun run install:deps

      - name: Build Desktop
        env:
          RELAY_URL: ${{ secrets.RELAY_URL }}
        run: bun turbo run build --filter=@rox/desktop

  build-cli:
    name: Build CLI
    uses: ./.github/workflows/build-cli.yml
    with:
      targets: '[{"os":"ubuntu-latest","target":"linux-x64"},{"os":"macos-14","target":"darwin-arm64"},{"os":"ubuntu-24.04-arm","target":"linux-arm64"}]'
      upload: false
    secrets: inherit
