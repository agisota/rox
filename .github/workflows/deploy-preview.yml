name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  render-managed:
    name: Render managed
    runs-on: ubuntu-latest
    steps:
      - name: Explain deployment ownership
        run: |
          echo "Preview deployments are no longer managed by Vercel."
          echo "Render is the deployment surface for Rox services."
          echo "Render pull request previews are currently disabled for the production services."
          echo "This check intentionally stays green so legacy Vercel deployment failures do not gate PRs."
