[mcp_servers.rox]
type = "sse"
url = "https://api.rox.one/api/v2/agent/mcp"

[mcp_servers.expo-mcp]
type = "sse"
url = "https://mcp.expo.dev/mcp"
enabled = false

[mcp_servers.maestro]
command = "maestro"
args = ["mcp"]

[mcp_servers.neon]
type = "sse"
url = "https://mcp.neon.tech/mcp"

[mcp_servers.linear]
type = "sse"
url = "https://mcp.linear.app/mcp"

[mcp_servers.sentry]
type = "sse"
url = "https://mcp.sentry.dev/mcp"

# Opt-in: codebase-memory MCP. Requires the `codebase-memory-mcp` binary on PATH.
# Do NOT commit this enabled — it breaks anyone (and CI) without the binary.
# To use it locally, copy these lines into your own machine-local Codex config
# (see docs/codebase-memory-mcp.md) or uncomment here without committing.
# [mcp_servers.codebase-memory]
# command = "codebase-memory-mcp"

# >>> rox default mcp servers >>>
[mcp_servers.filesystem]
command = "bunx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/marklindgreen/rox/worktrees/bf28c40c-933d-47b0-8e10-bc470dd1d63f/rox/complete-creature"]

[mcp_servers.sequential-thinking]
command = "bunx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.exa]
command = "bunx"
args = ["-y", "exa-mcp-server"]
env = { "EXA_API_KEY" = "${EXA_API_KEY}" }

[mcp_servers.context7]
command = "bunx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.telegram]
command = "bunx"
args = ["-y", "@chaindead/telegram-mcp"]
env = { "TELEGRAM_BOT_TOKEN" = "${TELEGRAM_BOT_TOKEN}" }
