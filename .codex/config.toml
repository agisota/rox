model = "gpt-5.5"
model_context_window = 400000
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
[mcp_servers.rox]
type = "sse"
url = "https://api.rox.one/api/v2/agent/mcp"

[mcp_servers.expo-mcp]
type = "sse"
url = "https://mcp.expo.dev/mcp"
enabled = false

[mcp_servers.maestro]
command = "maestro"
args = ["mcp"]

[mcp_servers.neon]
type = "sse"
url = "https://mcp.neon.tech/mcp"

[mcp_servers.linear]
type = "sse"
url = "https://mcp.linear.app/mcp"

[mcp_servers.sentry]
type = "sse"
url = "https://mcp.sentry.dev/mcp"

# Opt-in: codebase-memory MCP. Requires the `codebase-memory-mcp` binary on PATH.
# Do NOT commit this enabled — it breaks anyone (and CI) without the binary.
# To use it locally, copy these lines into your own machine-local Codex config
# (see docs/codebase-memory-mcp.md) or uncomment here without committing.
# [mcp_servers.codebase-memory]
# command = "codebase-memory-mcp"

# Managed by LazyCodex: multi_agent_v2 is re-disabled on every Codex session start
# because enabling it fails every turn with HTTP 400 (openai/codex#26753).
# Opt out: LAZYCODEX_CONFIG_MIGRATION_DISABLED=1 (or OMO_CODEX_CONFIG_MIGRATION_DISABLED=1).
[features.multi_agent_v2]
max_concurrent_threads_per_session = 1000
enabled = false

[agents]
max_threads = 1000
