services:
  postgres:
    image: postgres:17
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: main
    ports:
      - "${LOCAL_PG_PORT:-5432}:5432"
    volumes:
      - rox_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    environment:
      PG_CONNECTION_STRING: postgres://postgres:postgres@postgres:5432/main
    ports:
      - "${LOCAL_NEON_PROXY_PORT:-4444}:4444"
    depends_on:
      postgres:
        condition: service_healthy

  electric:
    image: electricsql/electric:1.4.13
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/main?sslmode=disable
      ELECTRIC_SECRET: local_electric_dev_secret
    ports:
      - "${LOCAL_ELECTRIC_PORT:-3100}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # Infra-runtime (#02): object storage (minio) + vector store (qdrant).
  # Ports come from .rox/setup.local.sh (ROX_PORT_BASE +16..+18); credentials
  # are local-dev defaults overridable via env.
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY_ID:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_ACCESS_KEY:-minioadmin}"
    ports:
      - "${LOCAL_MINIO_PORT:-9000}:9000"
      - "${LOCAL_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rox_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.2
    ports:
      - "${LOCAL_QDRANT_PORT:-6333}:6333"
    volumes:
      - rox_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rox_db_data:
  rox_minio_data:
  rox_qdrant_data:
